<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice Print Animation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        /* Custom Font */
        @font-face {
            font-family: 'RoundedPixel';
            src: url('RoundedPixel7-DpRx.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'RoundedPixel';
            src: url('RoundedPixel7-DpRx.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            background: #f5f5f7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 430px;
            height: 932px;
            position: relative;
            background: #f5f5f7;
            overflow: hidden;
        }

        /* Printer Bottom */
        .printer-bottom {
            width: 382px;
            height: 45px;
            left: 24px;
            top: 194px;
            position: absolute;
            background: linear-gradient(180deg, #303030 0%, #212121 100%);
            border-bottom-right-radius: 20px;
            border-bottom-left-radius: 20px;
            border-left: 2px #3A3A3A solid;
            border-right: 2px #3A3A3A solid;
            border-bottom: 2px #3A3A3A solid;
        }

        /* Printer Slot Bottom Part */
        .slot-bottom {
            width: 326px;
            height: 18px;
            left: 52px;
            top: 194px;
            position: absolute;
            background: #141414;
            border-bottom-right-radius: 10px;
            border-bottom-left-radius: 10px;
            border-left: 1px #3C3C3C solid;
            border-right: 1px #3C3C3C solid;
            border-bottom: 1px #3C3C3C solid;
        }

        /* Receipt */
        .receipt {
            width: 295px;
            height: 447px;
            left: 68px;
            position: absolute;
            box-shadow: 0px 10px 20px rgba(0, 0, 0, 0.15);
            background: white;
            cursor: grab;
            transition: none;
            top: -500px;
        }

        .receipt.active {
            cursor: grabbing;
        }

        .receipt-inner {
            width: 295px;
            height: 447px;
            padding: 13px 15px;
            position: absolute;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .receipt-content {
            width: 267px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        /* Logo */
        .receipt-logo {
            width: 100px;
            height: auto;
            margin-bottom: 5px;
        }

        .receipt-info {
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #1C1C1C;
            font-size: 16px;
            font-family: 'RoundedPixel', 'JetBrains Mono', monospace;
            font-weight: 500;
            text-transform: uppercase;
        }

        .items-header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #1C1C1C;
            font-size: 18px;
            font-family: 'RoundedPixel', 'JetBrains Mono', monospace;
            font-weight: 500;
            text-transform: uppercase;
        }

        .items-list {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #1C1C1C;
            font-size: 16px;
            font-family: 'RoundedPixel', 'JetBrains Mono', monospace;
            font-weight: 500;
            text-transform: uppercase;
            text-decoration: none;
            padding: 4px 8px;
            margin: -4px -8px;
            border-radius: 4px;
            transition: background 0.2s ease;
        }

        .item-row:hover {
            background: #f0f0f0;
        }

        .total-row {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #1C1C1C;
            font-size: 18px;
            font-family: 'RoundedPixel', 'JetBrains Mono', monospace;
            font-weight: 500;
            text-transform: uppercase;
        }

        .footer-text {
            width: 100%;
            padding-top: 10px;
            padding-bottom: 10px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .footer-brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            color: #1C1C1C;
            font-size: 13px;
            font-family: 'RoundedPixel', 'JetBrains Mono', monospace;
            font-weight: 500;
            text-transform: uppercase;
        }

        /* Printer Top */
        .printer-top {
            width: 382px;
            height: 72px;
            left: 24px;
            top: 123px;
            position: absolute;
            background: linear-gradient(180deg, #212121 0%, #303030 100%);
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            border-left: 2px #3A3A3A solid;
            border-top: 2px #3A3A3A solid;
            border-right: 2px #3A3A3A solid;
        }

        /* Printer Slot Top Part with Shadow */
        .slot-top-shadow {
            width: 326px;
            height: 18px;
            left: 52px;
            top: 177px;
            position: absolute;
            background: #141414;
            box-shadow: 0px 14px 36px 30px rgba(0, 0, 0, 0.32);
            border-bottom-right-radius: 10px;
            border-bottom-left-radius: 10px;
        }

        .slot-top {
            width: 326px;
            height: 18px;
            left: 52px;
            top: 177px;
            position: absolute;
            background: #0F0F0F;
            border-bottom-right-radius: 10px;
            border-bottom-left-radius: 10px;
            border-left: 1px #282828 solid;
            border-right: 1px #282828 solid;
            border-bottom: 1px #282828 solid;
        }

        /* Header Bar */
        .header-bar {
            width: 430px;
            height: 123px;
            left: 0px;
            top: 0px;
            position: absolute;
            background: #f5f5f7;
        }

        /* Get Invoice Button */
        .get-invoice-btn {
            width: 381px;
            height: 58px;
            padding: 10px;
            left: 25px;
            top: 817px;
            position: absolute;
            background: #1C1C1C;
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
        }

        .get-invoice-btn:hover {
            background: #2d2d2d;
            transform: translateY(-2px);
        }

        .get-invoice-btn:active {
            transform: translateY(0);
        }

        .btn-text {
            text-align: center;
            color: #F7F7F7;
            font-size: 18px;
             font-family: 'RoundedPixel';
            src: url('RoundedPixel7-DpRx.ttf') format('truetype');
            font-style: normal;
            font-weight: 400;
            line-height: 18px;
        }

        .get-invoice-btn.hidden {
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>

        let currentTop = -500;
        let currentLeft = 68;
        let isPrinted = false;

        // Animation curves from Figma: 0.25, 0, 0.8, 1 with 1000ms
        const easing = 'cubic-bezier(0.25, 0, 0.8, 1)';
        
        // Click button to start printing
        btn.addEventListener('click', () => {
            isPrinted = true;
            btn.classList.add('hidden');
            
            receipt.style.transition = `top 1s ${easing}`;
            receipt.style.top = '177px';
            currentTop = 177;
        });

        // Drag functionality
        function handleStart(e) {
            if (!isPrinted) return;
            
            isDragging = true;
            receipt.classList.add('active');
            receipt.style.transition = 'none';
            
            const clientX = e.type === 'mousedown' ? e.clientX : e.touches[0].clientX;
            const clientY = e.type === 'mousedown' ? e.clientY : e.touches[0].clientY;
            
            startX = clientX;
            startY = clientY;
            currentTop = parseInt(receipt.style.top) || 177;
            currentLeft = parseInt(receipt.style.left) || 68;
        }

        function handleMove(e) {
            if (!isDragging) return;
            
            e.preventDefault();
            
            const clientX = e.type === 'mousemove' ? e.clientX : e.touches[0].clientX;
            const clientY = e.type === 'mousemove' ? e.clientY : e.touches[0].clientY;
            
            const deltaX = clientX - startX;
            const deltaY = clientY - startY;
            
            const newTop = Math.max(100, currentTop + deltaY);
            const newLeft = currentLeft + deltaX;
            
            receipt.style.top = newTop + 'px';
            receipt.style.left = newLeft + 'px';
        }

        function handleEnd(e) {
            if (!isDragging) return;
            
            isDragging = false;
            receipt.classList.remove('active');
            receipt.style.transition = `all 1s ${easing}`;
            
            const finalTop = parseInt(receipt.style.top);
            const finalLeft = parseInt(receipt.style.left);
            
            const horizontalDistance = Math.abs(finalLeft - 68);
            const verticalDistance = finalTop - 177;
            
            // If swiped left or right significantly, dismiss
            if (horizontalDistance > 100) {
                if (finalLeft > 68) {
                    receipt.style.left = '1000px';
                } else {
                    receipt.style.left = '-1000px';
                }
                
                setTimeout(() => {
                    receipt.style.transition = 'none';
                    receipt.style.top = '-500px';
                    receipt.style.left = '68px';
                    btn.classList.remove('hidden');
                    isPrinted = false;
                    currentTop = -500;
                    currentLeft = 68;
                }, 1000);
            }
            // If dragged down significantly, dismiss downward
            else if (verticalDistance > 223) {
                receipt.style.top = '1000px';
                
                setTimeout(() => {
                    receipt.style.transition = 'none';
                    receipt.style.top = '-500px';
                    receipt.style.left = '68px';
                    btn.classList.remove('hidden');
                    isPrinted = false;
                    currentTop = -500;
                    currentLeft = 68;
                }, 1000);
            }
            // Otherwise snap back to position
            else {
                receipt.style.top = '177px';
                receipt.style.left = '68px';
                currentTop = 177;
                currentLeft = 68;
            }
        }

        // Mouse events
        receipt.addEventListener('mousedown', handleStart);
        document.addEventListener('mousemove', handleMove);
        document.addEventListener('mouseup', handleEnd);

        // Touch events
        receipt.addEventListener('touchstart', handleStart, { passive: false });
        document.addEventListener('touchmove', handleMove, { passive: false });
        document.addEventListener('touchend', handleEnd);
    </script>
</body>
</html>
