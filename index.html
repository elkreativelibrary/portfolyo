<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice Print Animation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 80px;
            padding: 40px;
        }

        .printer-container {
            position: relative;
            width: 382px;
            height: 117px;
        }

        /* Printer Top */
        .printer-top {
            width: 382px;
            height: 72px;
            position: absolute;
            top: 0;
            left: 0;
            background: linear-gradient(180deg, #212121 0%, #303030 100%);
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            border-left: 2px #3A3A3A solid;
            border-top: 2px #3A3A3A solid;
            border-right: 2px #3A3A3A solid;
            z-index: 3;
        }

        /* Printer Slot Top Part with Shadow */
        .slot-top-shadow {
            width: 326px;
            height: 18px;
            left: 28px;
            top: 54px;
            position: absolute;
            background: #141414;
            box-shadow: 0px 14px 36px 30px rgba(0, 0, 0, 0.32);
            border-bottom-right-radius: 10px;
            border-bottom-left-radius: 10px;
            z-index: 1;
        }

        .slot-top {
            width: 326px;
            height: 18px;
            left: 28px;
            top: 54px;
            position: absolute;
            background: #0F0F0F;
            border-bottom-right-radius: 10px;
            border-bottom-left-radius: 10px;
            border-left: 1px #282828 solid;
            border-right: 1px #282828 solid;
            border-bottom: 1px #282828 solid;
            z-index: 1;
        }

        /* Printer Bottom */
        .printer-bottom {
            width: 382px;
            height: 45px;
            position: absolute;
            top: 72px;
            left: 0;
            background: linear-gradient(180deg, #303030 0%, #212121 100%);
            border-bottom-right-radius: 20px;
            border-bottom-left-radius: 20px;
            border-left: 2px #3A3A3A solid;
            border-right: 2px #3A3A3A solid;
            border-bottom: 2px #3A3A3A solid;
            z-index: 3;
        }

        .slot-bottom {
            width: 326px;
            height: 18px;
            left: 28px;
            top: 72px;
            position: absolute;
            background: #141414;
            border-bottom-right-radius: 10px;
            border-bottom-left-radius: 10px;
            border-left: 1px #3C3C3C solid;
            border-right: 1px #3C3C3C solid;
            border-bottom: 1px #3C3C3C solid;
            z-index: 3;
        }

        /* Receipt */
        .receipt {
            width: 295px;
            height: 447px;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0px 10px 20px rgba(0, 0, 0, 0.15);
            background: white;
            cursor: grab;
            transition: none;
            top: -700px; /* Start hidden above - completely out of view */
            z-index: 2;
        }

        .receipt.active {
            cursor: grabbing;
        }

        .receipt-inner {
            width: 295px;
            height: 447px;
            padding: 13px 15px;
            position: absolute;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .receipt-content {
            width: 267px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .receipt-title {
            text-align: center;
            color: #1C1C1C;
            font-size: 28px;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 500;
            text-transform: uppercase;
        }

        .receipt-info {
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #1C1C1C;
            font-size: 16px;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 500;
            text-transform: uppercase;
        }

        .items-header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #1C1C1C;
            font-size: 18px;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 500;
            text-transform: uppercase;
        }

        .items-list {
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        .item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #1C1C1C;
            font-size: 16px;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 500;
            text-transform: uppercase;
        }

        .total-row {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #1C1C1C;
            font-size: 18px;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 500;
            text-transform: uppercase;
        }

        .footer-text {
            width: 100%;
            padding-top: 10px;
            padding-bottom: 10px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .footer-brand {
            display: flex;
            align-items: center;
            gap: 4px;
            color: #1C1C1C;
            font-size: 13px;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 500;
            text-transform: uppercase;
        }

        /* Get Invoice Button */
        .get-invoice-btn {
            width: 382px;
            height: 64px;
            padding: 10px;
            background: #1C1C1C;
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0, 0.8, 1);
            border: none;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .get-invoice-btn:hover {
            background: #2d2d2d;
            transform: translateY(-3px);
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.4);
        }

        .get-invoice-btn:active {
            transform: translateY(0);
        }

        .btn-text {
            text-align: center;
            color: #F7F7F7;
            font-size: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-weight: 500;
            line-height: 18px;
        }

        .get-invoice-btn.hidden {
            opacity: 0;
            pointer-events: none;
            transform: translateY(10px);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="printer-container">
            <!-- Receipt (Hidden Initially) -->
            <div class="receipt" id="receipt">
                <div class="receipt-inner">
                    <div class="receipt-content">
                        <div class="receipt-title">ELSARIHAN</div>
                        
                        <div class="receipt-info">
                            <div class="info-row">
                                <span>DATE :</span>
                                <span>NOVEMBER 22 - 25</span>
                            </div>
                            <div class="info-row">
                                <span>LOC :</span>
                                <span>ITAOSY F15</span>
                            </div>
                        </div>

                        <div style="height: 10px;"></div>

                        <div class="items-header">
                            <span>ITEM</span>
                            <span>PRICE</span>
                        </div>

                        <div class="items-list">
                            <div class="item-row">
                                <span>LOVE</span>
                                <span>15k MGA</span>
                            </div>
                            <div class="item-row">
                                <span>Happiness</span>
                                <span>15k MGA</span>
                            </div>
                            <div class="item-row">
                                <span>Vibes</span>
                                <span>15k MGA</span>
                            </div>
                            <div class="item-row">
                                <span>Energy</span>
                                <span>15k MGA</span>
                            </div>
                            <div class="item-row">
                                <span>look good</span>
                                <span>15k MGA</span>
                            </div>
                        </div>

                        <div style="height: 10px;"></div>

                        <div class="total-row">
                            <span>Total</span>
                            <span>75k mga</span>
                        </div>

                        <div class="footer-text">
                            <div class="footer-brand">
                                <span>aureando</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Printer Top -->
            <div class="printer-top"></div>
            <div class="slot-top-shadow"></div>
            <div class="slot-top"></div>

            <!-- Printer Bottom -->
            <div class="printer-bottom"></div>
            <div class="slot-bottom"></div>
        </div>

        <!-- Get Invoice Button -->
        <button class="get-invoice-btn" id="getInvoiceBtn">
            <div class="btn-text">Get invoice</div>
        </button>
    </div>

    <script>
        const receipt = document.getElementById('receipt');
        const btn = document.getElementById('getInvoiceBtn');
        
        let isDragging = false;
        let startY = 0;
        let currentTop = -700;
        let isPrinted = false;

        // Animation curve from Figma: 0.25, 0, 0.8, 1
        const easing = 'cubic-bezier(0.25, 0, 0.8, 1)';
        
        // Click button to start printing
        btn.addEventListener('click', () => {
            isPrinted = true;
            btn.classList.add('hidden');
            
            // Animate receipt sliding out from inside the slot
            receipt.style.transition = `top 1.5s ${easing}`;
            receipt.style.top = '54px'; // Position it emerging from the slot
            currentTop = 54;
        });

        // Drag functionality
        function handleStart(e) {
            if (!isPrinted) return;
            
            isDragging = true;
            receipt.classList.add('active');
            receipt.style.transition = 'none';
            
            startY = e.type === 'mousedown' ? e.clientY : e.touches[0].clientY;
            currentTop = parseInt(receipt.style.top) || 54;
        }

        function handleMove(e) {
            if (!isDragging) return;
            
            e.preventDefault();
            const clientY = e.type === 'mousemove' ? e.clientY : e.touches[0].clientY;
            const deltaY = clientY - startY;
            
            // Allow dragging down, limit dragging up slightly past the slot
            const newTop = Math.max(-20, currentTop + deltaY);
            receipt.style.top = newTop + 'px';
        }

        function handleEnd(e) {
            if (!isDragging) return;
            
            isDragging = false;
            receipt.classList.remove('active');
            receipt.style.transition = `top 1s ${easing}`;
            
            const finalTop = parseInt(receipt.style.top);
            
            // If dragged down past threshold, slide away
            if (finalTop > 250) {
                receipt.style.top = '800px';
                
                setTimeout(() => {
                    receipt.style.transition = 'none';
                    receipt.style.top = '-700px';
                    btn.classList.remove('hidden');
                    isPrinted = false;
                    currentTop = -700;
                }, 1000);
            } else {
                // Snap back to printed position
                receipt.style.top = '54px';
                currentTop = 54;
            }
        }

        // Mouse events
        receipt.addEventListener('mousedown', handleStart);
        document.addEventListener('mousemove', handleMove);
        document.addEventListener('mouseup', handleEnd);

        // Touch events
        receipt.addEventListener('touchstart', handleStart, { passive: false });
        document.addEventListener('touchmove', handleMove, { passive: false });
        document.addEventListener('touchend', handleEnd);
    </script>
</body>
</html>
