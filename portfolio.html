<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio</title>

  <style>
    @font-face {
      font-family: 'RoundedPixel';
      src: url('RoundedPixel7-DpRx.ttf') format('truetype');
    }

    *{
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body{
      font-family: 'RoundedPixel', monospace;
      background: #f5f5f7;
      color: #1C1C1C;
      display: flex;
      justify-content: center;
      padding: 40px 20px;
    }

    .container{
      width: 430px;
      max-width: 100%;
      display: flex;
      flex-direction: column;
      gap: 30px;
    }

    /* HEADER */
    .header{
      display: flex;
      justify-content: space-between;
      font-size: 16px;
      text-transform: uppercase;
    }

    .subheader{
      font-size: 14px;
      opacity: 0.7;
    }

    /* NAV */
    .nav{
      display: flex;
      justify-content: space-between;
      font-size: 16px;
      text-transform: uppercase;
    }

    .nav a{
      text-decoration: none;
      color: inherit;
      padding: 6px 10px;
      border-radius: 4px;
    }

    .nav a:hover{
      background: #eaeaea;
    }

    /* SECTION TITLE */
    .section-title{
      font-size: 18px;
      text-transform: uppercase;
      display: flex;
      justify-content: space-between;
    }

    /* GRID */
    .grid{
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    /* CARD */
    .card{
      background: white;
      box-shadow: 0px 10px 20px rgba(0,0,0,0.12);
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      transition: transform 0.2s ease;
    }

    .card:hover{
      transform: translateY(-4px);
    }

    .card img{
      width: 100%;
      height: auto;
      display: block;
    }

    .card-body{
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .card-title{
      font-size: 16px;
      text-transform: uppercase;
      display: flex;
      justify-content: space-between;
    }

    .card-desc{
      font-size: 13px;
      opacity: 0.7;
    }

    /* FOOTER */
    .footer{
      text-align: center;
      font-size: 13px;
      text-transform: lowercase;
      margin-top: 10px;
    }

  </style>
</head>

<body>

  <div class="container">

    <!-- HEADER -->
    <div>
      <div class="header">
        <span>portfolio</span>
        <span>2026</span>
      </div>
      <div class="subheader">selected works</div>
    </div>

    <!-- NAV -->
    <div class="nav">
      <a href="index.html">← back</a>
      <span>graphic designer</span>
    </div>

    <!-- TITLE -->
    <div class="section-title">
      <span>projects</span>
      <span>→</span>
    </div>

    <!-- CARDS -->
    <div class="grid">

      <a href="genshin_guesswho.html" class="card">
        <img src="images/gwpreview.jpg" alt="">
        <div class="card-body">
          <div class="card-title">
            <span>genshin guess who</span>
            <span>→</span>
          </div>
          <div class="card-desc">
            a little guessing game prototype
          </div>
        </div>
      </a>

      <a href="icons.html" class="card">
        <img src="images/iconspre.jpg" alt="">
        <div class="card-body">
          <div class="card-title">
            <span>icons draft</span>
            <span>→</span>
          </div>
          <div class="card-desc">
            prototype exploration
          </div>
        </div>
      </a>

      <a href="symbol_test_v2.html" class="card">
        <img src="images/preblack.png" alt="">
        <div class="card-body">
          <div class="card-title">
            <span>icons testing game</span>
            <span>→</span>
          </div>
          <div class="card-desc">
            prototype for thesis
          </div>
        </div>
      </a>

    </div>

    <!-- FOOTER -->
    <div class="footer">
      elsarihan
    </div>

  </div>

</body>
</html>
