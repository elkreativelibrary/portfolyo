<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio</title>

  <!-- RoundedPixel font -->
  <style>
    @font-face {
      font-family: 'RoundedPixel';
      src: url('RoundedPixel7-DpRx.ttf') format('truetype');
    }

    *{
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body{
      font-family: 'RoundedPixel', monospace;
      background: #f5f5f7;
      color: #1C1C1C;
      display: flex;
      justify-content: center;
      padding: 40px 20px;
    }

    .container{
      width: 430px;
      max-width: 100%;
      display: flex;
      flex-direction: column;
      gap: 30px;
    }

    /* HEADER (like receipt top) */
    .header{
      display: flex;
      justify-content: space-between;
      font-size: 16px;
      text-transform: uppercase;
    }

    .subheader{
      font-size: 14px;
      opacity: 0.7;
    }

    /* NAV */
    .nav{
      display: flex;
      justify-content: space-between;
      font-size: 16px;
      text-transform: uppercase;
    }

    .nav a{
      text-decoration: none;
      color: inherit;
      padding: 6px 10px;
      border-radius: 4px;
    }

    .nav a:hover{
      background: #eaeaea;
    }

    /* SECTION TITLE */
    .section-title{
      font-size: 18px;
      text-transform: uppercase;
      display: flex;
      justify-content: space-between;
    }

    /* PROJECT LIST (receipt style) */
    .project-list{
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .project{
      display: flex;
      justify-content: space-between;
      padding: 8px;
      margin: -8px;
      border-radius: 4px;
      text-decoration: none;
      color: inherit;
      transition: background 0.2s ease;
    }

    .project:hover{
      background: #f0f0f0;
    }

    .project-title{
      text-transform: uppercase;
    }

    .project-arrow{
      opacity: 0.6;
    }

    /* IMAGE PREVIEW */
    .preview{
      width: 100%;
      background: #ffffff;
      padding: 10px;
      box-shadow: 0px 10px 20px rgba(0,0,0,0.1);
    }

    .preview img{
      width: 100%;
      height: auto;
      display: block;
    }

    /* FOOTER */
    .footer{
      text-align: center;
      font-size: 13px;
      text-transform: lowercase;
      margin-top: 20px;
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- HEADER -->
    <div>
      <div class="header">
        <span>portfolio</span>
        <span>2026</span>
      </div>
      <div class="subheader">selected works</div>
    </div>

    <!-- NAV -->
    <div class="nav">
      <a href="index.html">← back</a>
      <span>graphic designer</span>
    </div>

    <!-- SECTION -->
    <div class="section-title">
      <span>projects</span>
      <span>→</span>
    </div>

    <!-- PROJECT LIST -->
    <div class="project-list">

      <a href="genshin_guesswho.html" class="project">
        <span class="project-title">genshin guess who</span>
        <span class="project-arrow">→</span>
      </a>

      <div class="preview">
        <img src="images/gwpreview.jpg" alt="">
      </div>

      <a href="icons.html" class="project">
        <span class="project-title">icons draft</span>
        <span class="project-arrow">→</span>
      </a>

      <div class="preview">
        <img src="images/iconspre.jpg" alt="">
      </div>

      <a href="symbol_test_v2.html" class="project">
        <span class="project-title">icons testing game</span>
        <span class="project-arrow">→</span>
      </a>

      <div class="preview">
        <img src="images/preblack.png" alt="">
      </div>

    </div>

    <!-- FOOTER -->
    <div class="footer">
      elsarihan
    </div>

  </div>

</body>
</html>
